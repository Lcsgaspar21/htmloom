<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HTMLoom</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1f2024;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #6e56cf;
        --accent-fg: #ffffff;
        --ok: #16a34a;
        --err: #dc2626;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1e1e1e;
          --fg: #f5f5f5;
          --muted: #9ca3af;
          --line: #2f2f2f;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 12px -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
      header {
        padding: 14px 16px 8px;
        border-bottom: 1px solid var(--line);
      }
      header h1 {
        font-size: 13px;
        margin: 0 0 2px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      header p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
      }
      main { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
      .drop {
        border: 1.5px dashed var(--line);
        border-radius: 8px;
        padding: 24px 16px;
        text-align: center;
        color: var(--muted);
        cursor: pointer;
        transition: background 120ms, border-color 120ms;
      }
      .drop--hover { border-color: var(--accent); background: rgba(110, 86, 207, 0.08); }
      .drop strong { color: var(--fg); display: block; margin-bottom: 4px; font-weight: 500; }
      .divider {
        display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 10.5px;
      }
      .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
      textarea {
        width: 100%;
        min-height: 120px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
        color: var(--fg);
        resize: vertical;
      }
      textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
      .actions { display: flex; align-items: center; gap: 8px; }
      button {
        background: var(--accent);
        color: var(--accent-fg);
        border: 0;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }
      button:disabled { opacity: 0.45; cursor: not-allowed; }
      .status {
        font-size: 11px;
        color: var(--muted);
        flex: 1;
        text-align: right;
      }
      .status[data-tone="ok"] { color: var(--ok); }
      .status[data-tone="error"] { color: var(--err); }
      .sandbox-wrap {
        position: absolute;
        width: 1280px;
        height: 1px;
        left: -99999px;
        top: -99999px;
        overflow: hidden;
      }
      .sandbox-wrap iframe { width: 1280px; height: 2000px; border: 0; }
      input[type="file"] { display: none; }
    </style>
  </head>
  <body>
    <header>
      <h1>HTMLoom</h1>
      <p>Weave an HTML file into editable Figma layers.</p>
    </header>
    <main>
      <label class="drop" id="drop" for="file">
        <strong>Drop an .html file</strong>
        or click to choose
        <input type="file" id="file" accept=".html,text/html" />
      </label>

      <div class="divider">or paste HTML</div>
      <textarea id="paste" placeholder="<div>...</div>"></textarea>

      <div class="actions">
        <button id="import" disabled>Import to Figma</button>
        <div class="status" id="status">&nbsp;</div>
      </div>
    </main>

    <div class="sandbox-wrap" aria-hidden="true">
      <iframe id="sandbox" sandbox="allow-same-origin"></iframe>
    </div>

    <script src="./ui.js"></script>
  </body>
</html>
