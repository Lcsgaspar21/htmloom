<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTMLoom · grid dashboard</title>
    <style>
      :root {
        --bg: #f7f8fc;
        --surface: #ffffff;
        --ink-900: #0d1320;
        --ink-700: #3b465c;
        --ink-500: #6b7891;
        --line: #e6eaf3;
        --brand-500: #6e56cf;
        --brand-600: #5d49b6;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --radius-md: 12px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--ink-900);
        padding: var(--space-6);
      }
      .dashboard {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: var(--space-6);
        max-width: 960px;
        margin: 0 auto;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: var(--space-5);
      }
      .header h1 {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }
      .header span {
        font-size: 13px;
        color: var(--ink-500);
      }

      /* The interesting bit: a 3x2 grid that the walker should detect as
         multi-track and split into 2 horizontal rows, each containing 3
         FILL cells with grow=1 (resolved fingerprint of `1fr 1fr 1fr`). */
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: auto auto;
        gap: var(--space-4);
      }
      .stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
      }
      .stat .label {
        font-size: 12px;
        color: var(--ink-500);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .stat .value {
        font-size: 24px;
        font-weight: 600;
        color: var(--ink-900);
      }
      .stat .delta {
        font-size: 12px;
        color: var(--brand-500);
      }
      .stat.alt {
        background: var(--brand-500);
        border-color: var(--brand-500);
        color: #fff;
      }
      .stat.alt .label { color: rgba(255, 255, 255, 0.7); }
      .stat.alt .value { color: #fff; }
      .stat.alt .delta { color: rgba(255, 255, 255, 0.85); }
    </style>
  </head>
  <body>
    <section class="dashboard">
      <header class="header">
        <h1>Account overview</h1>
        <span>Last 30 days</span>
      </header>

      <div class="stats">
        <article class="stat">
          <span class="label">Active users</span>
          <span class="value">12,480</span>
          <span class="delta">+8.2%</span>
        </article>
        <article class="stat">
          <span class="label">Sessions</span>
          <span class="value">38,902</span>
          <span class="delta">+3.1%</span>
        </article>
        <article class="stat">
          <span class="label">Conversion</span>
          <span class="value">2.4%</span>
          <span class="delta">+0.6 pp</span>
        </article>

        <article class="stat">
          <span class="label">Revenue</span>
          <span class="value">€48.2k</span>
          <span class="delta">+12.4%</span>
        </article>
        <article class="stat alt">
          <span class="label">MRR</span>
          <span class="value">€21.0k</span>
          <span class="delta">+5.6%</span>
        </article>
        <article class="stat">
          <span class="label">Churn</span>
          <span class="value">1.8%</span>
          <span class="delta">−0.2 pp</span>
        </article>
      </div>
    </section>
  </body>
</html>
